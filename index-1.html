<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theory Tracker</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a2332">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Theories">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; padding: 24px 16px; }
  .top-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:4px; }
  h1 { font-size: 22px; font-weight: 700; color: #1a2332; }
  .subtitle { font-size: 13px; color: #6b7a90; margin-bottom: 24px; }
  #auth-btn { border:1.5px solid #dde1e9; border-radius:10px; padding:7px 14px; font-size:12px; font-weight:600; cursor:pointer; font-family:inherit; background:#fff; color:#1a2332; transition:all .15s; }
  #sync-status { font-size:11px; color:#6b7a90; margin-bottom:16px; min-height:16px; }

  .add-box { background:#fff; border-radius:14px; padding:20px; margin-bottom:24px; box-shadow:0 1px 4px rgba(0,0,0,.07); }
  .add-box textarea { width:100%; border:1.5px solid #dde1e9; border-radius:10px; padding:12px; font-size:14px; font-family:inherit; resize:vertical; min-height:80px; outline:none; color:#1a2332; transition:border .15s; }
  .add-box textarea:focus { border-color:#3b6fd4; }
  .add-btn { margin-top:10px; background:#1a2332; color:#fff; border:none; border-radius:10px; padding:10px 22px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
  .add-btn:active { background:#3b6fd4; }

  .card { background:#fff; border-radius:14px; padding:18px; margin-bottom:14px; box-shadow:0 1px 4px rgba(0,0,0,.07); }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:14px; }
  .theory-text { font-size:14px; color:#1a2332; line-height:1.5; flex:1; }
  .del-btn { background:none; border:none; color:#aab0bb; font-size:18px; cursor:pointer; line-height:1; flex-shrink:0; padding:2px 4px; }
  .del-btn:hover { color:#e05252; }

  .stats { display:flex; gap:10px; margin-bottom:14px; }
  .stat-box { flex:1; border-radius:10px; padding:10px 12px; text-align:center; }
  .stat-box.pass { background:#eaf6f0; }
  .stat-box.fail { background:#fdecea; }
  .stat-num { font-size:22px; font-weight:700; }
  .stat-box.pass .stat-num { color:#2e7d5e; }
  .stat-box.fail .stat-num { color:#c0392b; }
  .stat-lbl { font-size:11px; font-weight:600; color:#6b7a90; letter-spacing:.4px; margin-top:2px; }
  .stat-box.rate { background:#eef2fc; flex:1.2; }
  .stat-box.rate .stat-num { color:#3b6fd4; font-size:20px; }

  .log-row { display:flex; gap:8px; }
  .log-btn { flex:1; padding:10px; border-radius:10px; border:none; font-size:13px; font-weight:700; cursor:pointer; font-family:inherit; transition:all .1s; }
  .log-btn.pass { background:#2e7d5e; color:#fff; }
  .log-btn.pass:active { background:#1f5c44; }
  .log-btn.fail { background:#c0392b; color:#fff; }
  .log-btn.fail:active { background:#922b21; }
  .undo-btn { background:none; border:1.5px solid #dde1e9; border-radius:10px; padding:10px 14px; font-size:12px; color:#6b7a90; cursor:pointer; font-family:inherit; }
  .undo-btn:active { border-color:#aab0bb; color:#1a2332; }

  .log-history { margin-top:12px; display:flex; flex-wrap:wrap; gap:5px; }
  .log-dot { width:10px; height:10px; border-radius:50%; }
  .log-dot.pass { background:#2e7d5e; }
  .log-dot.fail { background:#c0392b; }
  .empty { text-align:center; padding:40px 20px; color:#aab0bb; font-size:14px; }
</style>
</head>
<body>

<div class="top-row">
  <h1>Theory Tracker</h1>
  <button id="auth-btn">Sign in with Google</button>
</div>
<p class="subtitle">Log observations — track what works and what doesn't</p>
<div id="sync-status"></div>

<div class="add-box">
  <textarea id="theory-input" placeholder="Describe your theory or observation..."></textarea>
  <button class="add-btn" id="add-btn">+ Add Theory</button>
</div>

<div id="theories-list"></div>

<script type="module">
import { initializeApp }                                          from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged }
                                                                  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, set, onValue }                         from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ── FIREBASE CONFIG ──────────────────────────
const app  = initializeApp({
  apiKey:            "AIzaSyBpxoCdyU38Sq4-vK1A_W4atQ1AdvrhdoI",
  authDomain:        "tradelog-42241.firebaseapp.com",
  databaseURL:       "https://tradelog-42241-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:         "tradelog-42241",
  storageBucket:     "tradelog-42241.appspot.com",
  messagingSenderId: "21674370077",
  appId:             "1:21674370077:web:27860baa388c6713bb92f4"
});
const auth = getAuth(app);
const db   = getDatabase(app);

// ── STATE ────────────────────────────────────
let theories  = [];
let uid       = null;
let dataLoaded = false;

// ── SAVE ─────────────────────────────────────
function saveDB() {
  if (!uid || !dataLoaded) return;
  set(ref(db, uid + '/theories'), theories.length ? theories : null);
  setSyncStatus('Synced ✓', '#2e7d5e');
  setTimeout(() => setSyncStatus(''), 2000);
}

function setSyncStatus(msg, color) {
  const el = document.getElementById('sync-status');
  el.textContent = msg;
  el.style.color = color || '#6b7a90';
}

// ── RENDER ───────────────────────────────────
function render() {
  const list = document.getElementById('theories-list');
  if (!uid) {
    list.innerHTML = '<div class="empty">Sign in with Google to save your theories</div>';
    return;
  }
  if (!theories.length) {
    list.innerHTML = '<div class="empty">No theories yet — add one above</div>';
    return;
  }
  list.innerHTML = theories.map((t, i) => {
    const total = t.pass + t.fail;
    const rate  = total ? Math.round(t.pass / total * 100) + '%' : '—';
    const dots  = (t.log || []).slice(-30).map(r => `<div class="log-dot ${r}"></div>`).join('');
    return `
      <div class="card">
        <div class="card-top">
          <div class="theory-text">${t.text}</div>
          <button class="del-btn" data-del="${i}">✕</button>
        </div>
        <div class="stats">
          <div class="stat-box pass"><div class="stat-num">${t.pass}</div><div class="stat-lbl">PASS</div></div>
          <div class="stat-box fail"><div class="stat-num">${t.fail}</div><div class="stat-lbl">FAIL</div></div>
          <div class="stat-box rate"><div class="stat-num">${rate}</div><div class="stat-lbl">PASS RATE</div></div>
        </div>
        <div class="log-row">
          <button class="log-btn pass" data-log="${i}" data-result="pass">✓ Pass</button>
          <button class="log-btn fail" data-log="${i}" data-result="fail">✗ Fail</button>
          <button class="undo-btn" data-undo="${i}">↩ Undo</button>
        </div>
        ${(t.log||[]).length ? `<div class="log-history">${dots}</div>` : ''}
      </div>`;
  }).join('');
}

// ── EVENT DELEGATION ─────────────────────────
document.getElementById('theories-list').addEventListener('click', e => {
  const del  = e.target.closest('[data-del]');
  const log  = e.target.closest('[data-log]');
  const undo = e.target.closest('[data-undo]');

  if (del) {
    const i = parseInt(del.dataset.del);
    if (!confirm('Delete this theory and all its data?')) return;
    theories.splice(i, 1);
    saveDB(); render();
  }
  if (log) {
    const i = parseInt(log.dataset.log);
    const r = log.dataset.result;
    theories[i][r]++;
    theories[i].log = theories[i].log || [];
    theories[i].log.push(r);
    saveDB(); render();
  }
  if (undo) {
    const i = parseInt(undo.dataset.undo);
    const l = theories[i].log || [];
    const last = l.pop();
    if (last) theories[i][last]--;
    saveDB(); render();
  }
});

// ── ADD THEORY ───────────────────────────────
function addTheory() {
  if (!uid) { alert('Please sign in first.'); return; }
  const input = document.getElementById('theory-input');
  const text  = input.value.trim();
  if (!text) return;
  theories.unshift({ id: Date.now(), text, pass: 0, fail: 0, log: [] });
  saveDB(); render();
  input.value = '';
}
document.getElementById('add-btn').addEventListener('click', addTheory);
document.getElementById('theory-input').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') addTheory();
});

// ── AUTH ─────────────────────────────────────
document.getElementById('auth-btn').addEventListener('click', () => {
  if (uid) return;
  signInWithRedirect(auth, new GoogleAuthProvider())
    .catch(e => alert('Sign in failed: ' + e.message));
});

// Handle result after redirect
getRedirectResult(auth).catch(e => console.error('Redirect error:', e));

onAuthStateChanged(auth, user => {
  const btn = document.getElementById('auth-btn');
  if (user) {
    uid = user.uid;
    btn.textContent      = '● ' + (user.displayName ? user.displayName.split(' ')[0] : 'Signed in');
    btn.style.background = '#eaf6f0';
    btn.style.color      = '#2e7d5e';
    dataLoaded = false;
    setSyncStatus('Loading...', '#6b7a90');
    onValue(ref(db, uid + '/theories'), snap => {
      const val = snap.val();
      theories   = val ? Object.values(val) : [];
      dataLoaded = true;
      setSyncStatus('');
      render();
    });
  } else {
    uid = null; dataLoaded = false; theories = [];
    btn.textContent      = 'Sign in with Google';
    btn.style.background = '#fff';
    btn.style.color      = '#1a2332';
    setSyncStatus('');
    render();
  }
});
</script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
